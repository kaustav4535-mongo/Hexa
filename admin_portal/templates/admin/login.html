<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Admin Login — E-TukTukGo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>(function(){var s=localStorage.getItem('etuktuk-admin-theme')||'system';var r=s==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):s;document.documentElement.setAttribute('data-theme',r);})();</script>
  <style>
    :root{--brand:#1E8449;--brand-lt:#E9F7EF;--brand-dk:#166038;--bg:#F4F6F8;--surface:#fff;--border:#DDE3EC;--text-1:#1A1D23;--text-2:#4A5568;--text-3:#8A94A6;--shadow-lg:0 8px 32px rgba(0,0,0,.12);--radius-lg:18px;--radius-md:12px;--font-h:'Poppins',sans-serif;--font-b:'Noto Sans',sans-serif;}
    [data-theme="dark"]{--bg:#0E1117;--surface:#161B25;--border:rgba(255,255,255,.08);--text-1:#EDF2F7;--text-2:#A0AEC0;--text-3:#6B7A94;--brand:#2ECC71;--brand-lt:rgba(46,204,113,.12);--brand-dk:#27AE60;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text-1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .card{width:100%;max-width:390px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;box-shadow:var(--shadow-lg);position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),#27AE60);}
    .form-group{margin-bottom:1rem;}
    .form-label{display:block;font-size:.75rem;font-weight:600;color:var(--text-2);margin-bottom:.38rem;}
    .form-control{width:100%;padding:.7rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);color:var(--text-1);font-family:var(--font-b);font-size:.9rem;outline:none;transition:border-color .18s;}
    .form-control:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-lt);}
    .form-control::placeholder{color:var(--text-3);}
    .btn{width:100%;padding:.8rem;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-md);font-weight:700;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.5rem;font-family:var(--font-b);}
    .btn:hover{background:var(--brand-dk);transform:translateY(-1px);}
    .flash{padding:.65rem .9rem;border-radius:8px;margin-bottom:1rem;font-size:.84rem;}
    .flash-danger{background:#FDEDEC;border:1px solid #C0392B;color:#C0392B;}
    .flash-info{background:#EAF4FB;border:1px solid #2471A3;color:#2471A3;}
    [data-theme="dark"] .flash-danger{background:rgba(231,76,60,.12);}
    [data-theme="dark"] .flash-info{background:rgba(93,173,226,.12);color:#5DADE2;}
  </style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:1.75rem">
    <div style="width:52px;height:52px;background:var(--brand);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto .75rem">🛺</div>
    <h1 style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;margin-bottom:.2rem">Admin Sign In</h1>
    <p style="font-size:.83rem;color:var(--text-3)">E-TukTukGo Control Centre</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group"><label class="form-label">Admin Email</label><input type="email" name="email" class="form-control" placeholder="admin@etuktuk.in" required autofocus></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" name="password" class="form-control" placeholder="••••••••" required></div>
    <button type="submit" class="btn"><i class="fa fa-lock"></i> Sign In to Admin Panel</button>
  </form>
  <p style="text-align:center;margin-top:1rem;font-size:.75rem;color:var(--text-3);display:flex;align-items:center;justify-content:center;gap:.4rem">
    <i class="fa fa-shield-halved"></i> Restricted access · All actions are logged
  </p>
</div>
</body>
</html>
