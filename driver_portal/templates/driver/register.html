<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Register — E-TukTukGo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>(function(){var s=localStorage.getItem('etuktuk-driver-theme')||'system';var r=s==='system'?(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):s;document.documentElement.setAttribute('data-theme',r);})();</script>
  <style>
    :root{--brand:#1E8449;--brand-lt:#E9F7EF;--brand-dk:#166038;--info:#2471A3;--info-lt:#EAF4FB;--bg:#F4F6F8;--surface:#fff;--border:#DDE3EC;--text-1:#1A1D23;--text-2:#4A5568;--text-3:#8A94A6;--shadow-lg:0 8px 32px rgba(0,0,0,.12);--radius-lg:18px;--radius-md:12px;--font-h:'Poppins',sans-serif;--font-b:'Noto Sans',sans-serif;}
    [data-theme="dark"]{--bg:#0E1117;--surface:#161B25;--border:rgba(255,255,255,.08);--text-1:#EDF2F7;--text-2:#A0AEC0;--text-3:#6B7A94;--brand:#2ECC71;--brand-lt:rgba(46,204,113,.12);--info:#5DADE2;--info-lt:rgba(93,173,226,.12);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text-1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
    .card{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;box-shadow:var(--shadow-lg);}
    .form-group{margin-bottom:1rem;}
    .form-label{display:block;font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:.38rem;}
    .form-control{width:100%;padding:.7rem 1rem;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);color:var(--text-1);font-family:var(--font-b);font-size:.9rem;outline:none;transition:border-color .18s;}
    .form-control:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-lt);}
    .form-control::placeholder{color:var(--text-3);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .btn{width:100%;padding:.8rem;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-md);font-weight:700;font-size:.95rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:.5rem;font-family:var(--font-b);}
    .btn:hover{background:var(--brand-dk);}
    .info-box{background:var(--info-lt);border:1px solid var(--info);border-radius:var(--radius-md);padding:.82rem 1rem;font-size:.82rem;color:var(--info);display:flex;gap:.5rem;margin-bottom:1.4rem;}
    .flash-danger{padding:.7rem 1rem;background:#FDEDEC;border:1px solid #C0392B;border-radius:8px;font-size:.85rem;color:#C0392B;margin-bottom:1rem;}
    .flash-warning{padding:.7rem 1rem;background:#FEF9E7;border:1px solid #D4AC0D;border-radius:8px;font-size:.85rem;color:#7D6608;margin-bottom:1rem;}
    @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:1.6rem">
    <div style="font-size:2.5rem;margin-bottom:.5rem">🛺</div>
    <h1 style="font-family:var(--font-h);font-size:1.4rem;font-weight:800;margin-bottom:.25rem"><span data-i18n="auth.driverReg">Join as a Driver</span></h1>
    <p style="font-size:.84rem;color:var(--text-3)"><span data-i18n="auth.registerSub">Register and earn with E-TukTukGo</span></p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}<div class="flash-{{ cat }}">{{ msg }}</div>{% endfor %}
  {% endwith %}
  <div class="info-box"><i class="fa fa-circle-info" style="flex-shrink:0;margin-top:.1rem"></i><span>After registration, admin will review and approve your account within 24 hours.</span></div>
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <div class="form-group"><label class="form-label" data-i18n="label.name">Full Name *</label></label><input type="text" name="name" class="form-control" placeholder="Raju Sharma" required></div>
      <div class="form-group"><label class="form-label" data-i18n="label.phone">Phone *</label></label><input type="tel" name="phone" class="form-control" placeholder="+91 98765 00001" required></div>
    </div>
    <div class="form-group"><label class="form-label" data-i18n="label.email">Email *</label></label><input type="email" name="email" class="form-control" placeholder="driver@example.com" required></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Vehicle Number *</label><input type="text" name="vehicle_number" class="form-control" placeholder="MH12-EV-0001" required></div>
      <div class="form-group"><label class="form-label">License Number *</label><input type="text" name="license_no" class="form-control" placeholder="MH1234567890" required></div>
    </div>
    <div class="form-group"><label class="form-label" data-i18n="label.password">Password *</label></label><div class="pw-wrap"><input type="password" name="password" id="pw-drv-reg" class="form-control" placeholder="Min 8 characters" minlength="8" required><button type="button" class="pw-eye" onclick="togglePw('pw-drv-reg',this)" tabindex="-1">👁️</button></div></div>
    <button type="submit" class="btn"><span data-i18n="auth.register">Create Driver Account</span> →</button>
  </form>
  <p style="text-align:center;margin-top:1.1rem;font-size:.83rem;color:var(--text-3)">Already registered? <a href="/auth/login" style="color:var(--brand);font-weight:600"><span data-i18n="auth.signIn">Log in</span></a></p>
</div>

  <div style="position:fixed;top:.75rem;right:.75rem;display:flex;gap:.25rem;z-index:100">
    <button onclick="setLang('en')" id="lb-en"
      style="padding:.25rem .55rem;border-radius:6px;border:1.5px solid #DDE3EC;font-size:.7rem;font-weight:700;cursor:pointer;background:#fff;color:#4A5568;transition:all .15s">EN</button>
    <button onclick="setLang('as')" id="lb-as"
      style="padding:.25rem .55rem;border-radius:6px;border:1.5px solid #DDE3EC;font-size:.7rem;font-weight:700;cursor:pointer;background:#fff;color:#4A5568;transition:all .15s">অসম</button>
    <button onclick="setLang('hi')" id="lb-hi"
      style="padding:.25rem .55rem;border-radius:6px;border:1.5px solid #DDE3EC;font-size:.7rem;font-weight:700;cursor:pointer;background:#fff;color:#4A5568;transition:all .15s">हि</button>
  </div>
  <script src="/static/js/i18n.js"></script>
  <script>
  function togglePw(id,btn){var i=document.getElementById(id);if(!i)return;i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'👁️':'🙈';}
  </script>
</body>
</html>
