{% extends "driver/base.html" %}
{% block title %}Edit Profile — Driver Hub{% endblock %}
{% block page_title %}Edit Profile{% endblock %}
{% block content %}
<div style="max-width:500px">
  <div class="card card-p">
    <form method="POST">
      <div class="form-group"><label class="form-label">Full Name</label><input type="text" name="name" class="form-control" value="{{ driver.name }}" required></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" name="phone" class="form-control" value="{{ driver.phone or '' }}"></div>
      <div class="form-group"><label class="form-label">Vehicle Number</label><input type="text" name="vehicle_number" class="form-control" value="{{ driver.vehicle_number or '' }}"></div>
      <div class="form-group"><label class="form-label">License Number</label><input type="text" name="license_no" class="form-control" value="{{ driver.license_no or '' }}"></div>
      <div class="form-group"><label class="form-label">Email (read-only)</label><input type="email" class="form-control" value="{{ driver.email }}" disabled style="opacity:.5;cursor:not-allowed"></div>
      <div style="display:flex;gap:.75rem;margin-top:.5rem">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/profile/" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
