{% extends "customer/base.html" %}
{% block title %}Register — E-TukTukGo{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg)">
  <div style="width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:2.5rem;box-shadow:var(--shadow-lg)">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🛺</div>
      <h1 style="font-family:var(--font-h);font-size:1.5rem;font-weight:800;margin-bottom:.25rem">Create your account</h1>
      <p style="font-size:.87rem;color:var(--text-3)"><span data-i18n="auth.registerTitle">Join E-TukTukGo</span> — free forever</p>
    </div>
    <a href="/auth/google" class="btn-google" style="margin-bottom:1.25rem">
      <img src="https://www.google.com/favicon.ico" alt="G"> Sign up with Google
    </a>
    <div class="divider">or register with email</div>
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" data-i18n="label.name">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Ravi Kumar" required>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label.phone">Phone</label>
          <input type="tel" name="phone" class="form-control" placeholder="+91 98765..." required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="label.email">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="label.password">Password</label>
        <input type="password" name="password" id="pw-reg" class="form-control" placeholder="Min 8 characters" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-xl" style="margin-top:.5rem">
        <i class="fa fa-bolt"></i> Create Account
      </button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--text-3)">
      Already have an account? <a href="/auth/login" style="color:var(--brand);font-weight:600">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
