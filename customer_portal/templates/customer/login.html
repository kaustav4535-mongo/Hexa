{% extends "customer/base.html" %}
{% block title %}Login — E-TukTukGo{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;padding:2rem 1rem;background:var(--bg)">
  <div style="width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:2.5rem;box-shadow:var(--shadow-lg)">
    <div style="text-align:center;margin-bottom:1.75rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🛺</div>
      <h1 style="font-family:var(--font-h);font-size:1.5rem;font-weight:800;margin-bottom:.25rem">Welcome back</h1>
      <p style="font-size:.87rem;color:var(--text-3)">Log in to your E-TukTukGo account</p>
    </div>
    <a href="/auth/google" class="btn-google" style="margin-bottom:1.25rem">
      <img src="https://www.google.com/favicon.ico" alt="G"> <span data-i18n="auth.googleBtn">Continue with Google</span>
    </a>
    <div class="divider">or</div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label class="form-label" data-i18n="label.email">Email Address</label>
        <div class="input-icon">
          <i class="fa fa-envelope ii"></i>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="label.password">Password</label>
        <div class="input-icon">
          <i class="fa fa-lock ii"></i>
          <input type="password" name="password" id="pw-login" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-xl" style="margin-top:.5rem">
        <i class="fa fa-arrow-right-to-bracket"></i> Log In
      </button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--text-3)">
      No account? <a href="/auth/register" style="color:var(--brand);font-weight:600">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
